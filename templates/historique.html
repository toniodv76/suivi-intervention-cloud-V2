<!doctype html>
<html lang="fr"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>Historique interventions</title>
<style>
body{margin:0;background:#f3f7fb;font-family:Arial,Helvetica,sans-serif;color:#102033}header{background:#fff;padding:22px 28px;box-shadow:0 3px 18px rgba(0,0,0,.06);display:flex;justify-content:space-between;align-items:center;gap:16px;flex-wrap:wrap}h1{margin:0;font-size:34px}a{display:inline-block;text-decoration:none;background:#e8f0ff;color:#0f45a5;padding:11px 16px;border-radius:12px;font-weight:700;margin:3px}main{padding:24px;max-width:1500px;margin:auto}.panel{background:#fff;border-radius:22px;box-shadow:0 8px 25px rgba(0,0,0,.08);padding:22px}table{width:100%;border-collapse:separate;border-spacing:0 10px}th{text-align:left;color:#5d7189;font-size:14px;padding:0 12px}td{background:#fff;padding:14px 12px;vertical-align:top;border-top:1px solid #edf2f7;border-bottom:1px solid #edf2f7;font-size:16px}td:first-child{border-left:1px solid #edf2f7;border-radius:15px 0 0 15px}td:last-child{border-right:1px solid #edf2f7;border-radius:0 15px 15px 0}.nature{max-width:650px;white-space:pre-wrap;line-height:1.35}.urgent td{background:#ffdde0}.encours td{background:#fff0c2}.termine td{background:#d9f7df}
</style></head><body><header><h1>Historique interventions</h1><div><a href="/?code={{ code }}">Retour</a><a href="/export/monthly?code={{ code }}">Export mois</a><a href="/export/all?code={{ code }}">Export complet</a></div></header><main><section class="panel"><table><thead><tr><th>Date</th><th>Client</th><th>Adresse</th><th>Nature</th><th>Urgence</th><th>Statut</th><th>Créé le</th><th>Terminé le</th></tr></thead><tbody>{% for i in interventions %}<tr class="{% if i.statut == 'TERMINE' %}termine{% elif i.urgence == 'URGENT' %}urgent{% elif i.statut == 'EN COURS' %}encours{% endif %}"><td>{{ i.date_intervention }}</td><td><b>{{ i.client }}</b></td><td>{{ i.adresse }}</td><td class="nature">{{ i.nature }}</td><td>{{ i.urgence }}</td><td><b>{{ i.statut }}</b></td><td>{{ i.created_at }}</td><td>{{ i.done_at or '' }}</td></tr>{% endfor %}</tbody></table></section></main></body></html>
