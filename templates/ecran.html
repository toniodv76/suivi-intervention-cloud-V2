```html
<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="refresh" content="10">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interventions</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body {
            background: #021126;
            color: white;
            overflow-x: hidden;
        }

        .topbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 30px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }

        .topbar h1 {
            font-size: 52px;
            font-weight: bold;
        }

        .heure {
            font-size: 34px;
            font-weight: bold;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(520px, 1fr));
            gap: 18px;
            padding: 18px;
        }

        .card {
            background: #f5f5f5;
            color: #021126;
            border-radius: 24px;
            padding: 24px;
            position: relative;
            min-height: 180px;
            max-height: 280px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .card.urgent {
            border-left: 14px solid #ff304f;
        }

        .card.normale {
            border-left: 14px solid #d7dce2;
        }

        .date {
            position: absolute;
            top: 20px;
            right: 24px;
            font-size: 20px;
            font-weight: bold;
            color: #304f73;
        }

        .client {
            font-size: clamp(28px, 2vw, 42px);
            font-weight: bold;
            margin-bottom: 8px;
            padding-right: 140px;
        }

        .adresse {
            font-size: clamp(18px, 1.3vw, 26px);
            font-weight: bold;
            margin-bottom: 18px;
            color: #1f3552;
        }

        .nature {
            font-size: clamp(18px, 1.4vw, 28px);
            line-height: 1.25;
            overflow-wrap: break-word;
            word-break: break-word;
            max-height: 110px;
            overflow: hidden;
        }

        .badges {
            display: flex;
            gap: 10px;
            margin-top: 18px;
            flex-wrap: wrap;
        }

        .badge {
            padding: 10px 16px;
            border-radius: 999px;
            font-size: 16px;
            font-weight: bold;
        }

        .urgence {
            background: #ffd6dc;
            color: #9b0017;
        }

        .normal {
            background: #e5e7eb;
            color: #304f73;
        }

        .faire {
            background: #dbeafe;
            color: #1d4f91;
        }

        .encours {
            background: #ffe7c2;
            color: #9a5b00;
        }

        .termine {
            background: #d8f5dc;
            color: #0d6b24;
        }
    </style>
</head>
<body>

<div class="topbar">
    <h1>Interventions</h1>
    <div class="heure" id="heure"></div>
</div>

<div class="grid">
    {% for intervention in interventions %}
    <div class="card {{ 'urgent' if intervention.urgence == 'URGENT' else 'normale' }}">

        <div class="date">{{ intervention.date }}</div>

        <div>
            <div class="client">{{ intervention.client }}</div>
            <div class="adresse">{{ intervention.adresse }}</div>
            <div class="nature">{{ intervention.nature }}</div>
        </div>

        <div class="badges">
            <div class="badge {{ 'urgence' if intervention.urgence == 'URGENT' else 'normal' }}">
                {{ intervention.urgence }}
            </div>

            <div class="badge 
                {% if intervention.statut == 'A FAIRE' %}faire{% endif %}
                {% if intervention.statut == 'EN COURS' %}encours{% endif %}
                {% if intervention.statut == 'TERMINE' %}termine{% endif %}
            ">
                {{ intervention.statut }}
            </div>
        </div>

    </div>
    {% endfor %}
</div>

<script>
function updateClock() {
    const now = new Date();
    const options = {
        weekday: 'long',
        hour: '2-digit',
        minute: '2-digit'
    };

    document.getElementById('heure').innerText =
        now.toLocaleDateString('fr-FR', options);
}

setInterval(updateClock, 1000);
updateClock();
</script>

</body>
</html>
```
