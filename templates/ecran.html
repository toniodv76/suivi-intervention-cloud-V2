<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Écran interventions</title>
  <style>
    :root{--bg:#07111f;--card:#fff;--red:#ff3347;--green:#25d366;--orange:#ffb020;--blue:#4da3ff;--muted:#b9c7d6}
    *{box-sizing:border-box} body{margin:0;background:var(--bg);font-family:Arial,Helvetica,sans-serif;color:#fff;overflow:hidden}
    header{padding:26px 34px;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid rgba(255,255,255,.12)}
    h1{font-size:46px;margin:0}.clock{font-size:28px;color:var(--muted);font-weight:700}
    #wrap{padding:26px;display:grid;grid-template-columns:repeat(2,1fr);gap:22px;height:calc(100vh - 104px);overflow:auto}
    .card{background:#fff;color:#102033;border-radius:26px;padding:24px;box-shadow:0 10px 32px rgba(0,0,0,.25);border-left:16px solid #d9e3ef;min-height:230px}
    .card.urgent{border-left-color:var(--red)}.card.encours{border-left-color:var(--orange)}.card.termine{border-left-color:var(--green)}
    .top{display:flex;justify-content:space-between;gap:15px;align-items:flex-start}.client{font-size:36px;font-weight:900;line-height:1.05}.date{font-size:24px;font-weight:900;color:#395064;white-space:nowrap}.adresse{font-size:24px;color:#32475c;margin-top:8px;font-weight:700}.nature{font-size:27px;line-height:1.2;margin-top:18px;white-space:pre-wrap;max-height:130px;overflow:hidden}.badges{margin-top:18px;display:flex;gap:12px;flex-wrap:wrap}.badge{font-size:21px;font-weight:900;border-radius:999px;padding:10px 16px}.b-urgent{background:#ffdde0;color:#9d111d}.b-normal{background:#edf3f8;color:#40566e}.b-afaire{background:#edf3f8;color:#40566e}.b-encours{background:#fff0c2;color:#7a5200}.b-termine{background:#d9f7df;color:#126324}
    .empty{grid-column:1/-1;text-align:center;color:#b9c7d6;font-size:42px;margin-top:15vh}
  </style>
</head>
<body>
<header><h1>Interventions</h1><div class="clock" id="clock"></div></header>
<div id="wrap"></div>
<script>
function esc(s){return (s ?? '').toString().replace(/[&<>'"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[c]));}
function cls(i){if(i.statut==='TERMINE')return'termine';if(i.urgence==='URGENT')return'urgent';if(i.statut==='EN COURS')return'encours';return''}
function badgeStatut(s){if(s==='TERMINE')return'b-termine';if(s==='EN COURS')return'b-encours';return'b-afaire'}
async function load(){
 const r=await fetch('/api/interventions',{cache:'no-store'}); const data=await r.json(); const wrap=document.getElementById('wrap');
 if(!data.length){wrap.innerHTML='<div class="empty">Aucune intervention</div>';return;}
 wrap.innerHTML=data.map(i=>`<div class="card ${cls(i)}"><div class="top"><div><div class="client">${esc(i.client)}</div><div class="adresse">${esc(i.adresse)}</div></div><div class="date">${esc(i.date_intervention)}</div></div><div class="nature">${esc(i.nature)}</div><div class="badges"><span class="badge ${i.urgence==='URGENT'?'b-urgent':'b-normal'}">${esc(i.urgence)}</span><span class="badge ${badgeStatut(i.statut)}">${esc(i.statut)}</span></div></div>`).join('');
}
function tick(){document.getElementById('clock').textContent=new Date().toLocaleString('fr-FR',{weekday:'long',hour:'2-digit',minute:'2-digit'});} 
setInterval(load,2000);setInterval(tick,1000);load();tick();
</script>
</body>
</html>
