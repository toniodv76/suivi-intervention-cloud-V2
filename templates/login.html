<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Suivi interventions - Connexion</title>
  <style>
    body{margin:0;font-family:Arial,Helvetica,sans-serif;background:#f3f7fb;color:#102033;display:flex;min-height:100vh;align-items:center;justify-content:center}
    .card{background:white;border-radius:22px;box-shadow:0 12px 35px rgba(0,0,0,.10);padding:34px;width:min(420px,92vw)}
    h1{margin:0 0 10px;font-size:30px}.sub{color:#5d7189;margin-bottom:24px}
    input,button{width:100%;box-sizing:border-box;border-radius:14px;font-size:20px;padding:15px;border:1px solid #d6e0ea}
    button{margin-top:14px;background:#0f67ff;color:white;border:0;font-weight:700;cursor:pointer}
  </style>
</head>
<body>
  <form class="card" method="get" action="/">
    <h1>Interventions</h1>
    <div class="sub">Entre le code d'accès</div>
    <input name="code" type="password" placeholder="Code" autofocus>
    <button type="submit">Entrer</button>
  </form>
</body>
</html>
